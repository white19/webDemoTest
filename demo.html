<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>內網流量儀表板 Demo</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		body {
			margin: 0;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: #f2f6fb;
			color: #1f2937;
		}
		.page {
			max-width: 980px;
			margin: 32px auto;
			padding: 0 16px 32px;
		}
		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			flex-wrap: wrap;
		}
		.header h1 {
			margin: 0;
			font-size: 1.8rem;
		}
		.card {
			background: #ffffff;
			border-radius: 22px;
			box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
			padding: 24px;
			margin-top: 24px;
		}
		.summary-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 16px;
			margin-bottom: 24px;
		}
		.summary-card {
			background: #f8fafc;
			border-radius: 18px;
			padding: 18px 20px;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		.summary-card strong {
			font-size: 1.6rem;
			color: #0f172a;
		}
		.summary-card span {
			color: #475569;
			font-size: 0.95rem;
		}
		table {
			width: 100%;
			border-collapse: collapse;
		}
		thead th {
			text-align: left;
			color: #334155;
			font-size: 0.95rem;
			padding-bottom: 12px;
			border-bottom: 1px solid #e2e8f0;
		}
		tbody tr + tr td {
			padding-top: 14px;
		}
		td {
			padding: 12px 0;
			vertical-align: middle;
			border-bottom: 1px solid #f1f5f9;
		}
		td:first-child {
			width: 110px;
			font-weight: 600;
			color: #0f172a;
		}
		.chart-container {
			position: relative;
			height: 400px;
			margin: 24px 0;
		}
		.legend {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			margin-top: 16px;
			color: #475569;
			font-size: 0.9rem;
		}
		.legend-dot {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			display: inline-block;
		}
		@media (max-width: 640px) {
			.summary-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="page">
		<div class="header">
			<div>
				<h1>一周內網流量儀表板</h1>
				<p style="margin: 8px 0 0; color: #64748b; font-size: 1rem;">
					顯示過去 7 天每日進出內網流量，單位為 MB，資料由前端變數隨機生成。
				</p>
			</div>
		</div>
		<div class="card">
			<div class="summary-grid">
				<div class="summary-card">
					<span>本週進站流量</span>
					<strong id="total-inbound">0 MB</strong>
				</div>
				<div class="summary-card">
					<span>本週出站流量</span>
					<strong id="total-outbound">0 MB</strong>
				</div>
			</div>
			<div class="chart-container">
				<canvas id="traffic-chart"></canvas>
			</div>
			<div class="legend">
				<span class="legend-dot" style="background: #38bdf8;"></span> 進站
				<span class="legend-dot" style="background: #818cf8;"></span> 出站
			</div>
		</div>
	</div>
	<script>
		const weekLabels = [
			'週一', '週二', '週三', '週四', '週五', '週六', '週日'
		];

		function randomMB(min, max) {
			return Math.floor(Math.random() * (max - min + 1)) + min;
		}

		const trafficData = weekLabels.map((label) => ({
			day: label,
			inboundMB: randomMB(220, 980),
			outboundMB: randomMB(130, 760)
		}));

		const totalInboundEl = document.getElementById('total-inbound');
		const totalOutboundEl = document.getElementById('total-outbound');

		let totalInbound = 0;
		let totalOutbound = 0;
		const inboundValues = [];
		const outboundValues = [];

		trafficData.forEach((item) => {
			totalInbound += item.inboundMB;
			totalOutbound += item.outboundMB;
			inboundValues.push(item.inboundMB);
			outboundValues.push(item.outboundMB);
		});

		totalInboundEl.textContent = `${totalInbound.toLocaleString()} MB`;
		totalOutboundEl.textContent = `${totalOutbound.toLocaleString()} MB`;

		const ctx = document.getElementById('traffic-chart').getContext('2d');
		const chart = new Chart(ctx, {
			type: 'line',
			data: {
				labels: weekLabels,
				datasets: [
					{
						label: '進站 (MB)',
						data: inboundValues,
						borderColor: '#38bdf8',
						backgroundColor: 'rgba(56, 189, 248, 0.1)',
						borderWidth: 2,
						fill: true,
						tension: 0.4,
						pointRadius: 5,
						pointBackgroundColor: '#38bdf8',
						pointBorderColor: '#ffffff',
						pointBorderWidth: 2
					},
					{
						label: '出站 (MB)',
						data: outboundValues,
						borderColor: '#818cf8',
						backgroundColor: 'rgba(129, 140, 248, 0.1)',
						borderWidth: 2,
						fill: true,
						tension: 0.4,
						pointRadius: 5,
						pointBackgroundColor: '#818cf8',
						pointBorderColor: '#ffffff',
						pointBorderWidth: 2
					}
				]
			},
			options: {
				responsive: true,
				maintainAspectRatio: false,
				interaction: {
					mode: 'index',
					intersect: false
				},
				plugins: {
					legend: {
						display: true,
						position: 'top',
						labels: {
							usePointStyle: true,
							padding: 15,
							font: {
								size: 12
							}
						}
					}
				},
				scales: {
					y: {
						beginAtZero: true,
						ticks: {
							callback: function(value) {
								return value + ' MB';
							}
						}
					}
				}
			}
		});
	</script>
</body>
</html>
