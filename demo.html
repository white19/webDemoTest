<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>內網流量儀表板 Demo</title>
	<style>
		body {
			margin: 0;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: #f2f6fb;
			color: #1f2937;
		}
		.page {
			max-width: 980px;
			margin: 32px auto;
			padding: 0 16px 32px;
		}
		.header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 16px;
			flex-wrap: wrap;
		}
		.header h1 {
			margin: 0;
			font-size: 1.8rem;
		}
		.card {
			background: #ffffff;
			border-radius: 22px;
			box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
			padding: 24px;
			margin-top: 24px;
		}
		.summary-grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 16px;
			margin-bottom: 24px;
		}
		.summary-card {
			background: #f8fafc;
			border-radius: 18px;
			padding: 18px 20px;
			display: flex;
			flex-direction: column;
			gap: 8px;
		}
		.summary-card strong {
			font-size: 1.6rem;
			color: #0f172a;
		}
		.summary-card span {
			color: #475569;
			font-size: 0.95rem;
		}
		table {
			width: 100%;
			border-collapse: collapse;
		}
		thead th {
			text-align: left;
			color: #334155;
			font-size: 0.95rem;
			padding-bottom: 12px;
			border-bottom: 1px solid #e2e8f0;
		}
		tbody tr + tr td {
			padding-top: 14px;
		}
		td {
			padding: 12px 0;
			vertical-align: middle;
			border-bottom: 1px solid #f1f5f9;
		}
		td:first-child {
			width: 110px;
			font-weight: 600;
			color: #0f172a;
		}
		canvas {
			display: block;
			margin: 0 auto;
			max-width: 100%;
		}
		.legend {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			margin-top: 16px;
			color: #475569;
			font-size: 0.9rem;
		}
		.legend-dot {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			display: inline-block;
		}
		@media (max-width: 640px) {
			.summary-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class="page">
		<div class="header">
			<div>
				<h1>一周內網流量儀表板</h1>
				<p style="margin: 8px 0 0; color: #64748b; font-size: 1rem;">
					顯示過去 7 天每日進出內網流量，單位為 MB，資料由前端變數隨機生成。
				</p>
			</div>
		</div>
		<div class="card">
			<div class="summary-grid">
				<div class="summary-card">
					<span>本週進站流量</span>
					<strong id="total-inbound">0 MB</strong>
				</div>
				<div class="summary-card">
					<span>本週出站流量</span>
					<strong id="total-outbound">0 MB</strong>
				</div>
			</div>
			<div class="legend" style="margin-bottom: 20px;">
				<span class="legend-dot" style="background: #38bdf8;"></span> 進站
				<span class="legend-dot" style="background: #818cf8;"></span> 出站
			</div>
			<canvas id="traffic-chart"></canvas>
			<table style="margin-top: 32px;">
				<thead>
					<tr>
						<th>日期</th>
						<th>進站 (MB)</th>
						<th>出站 (MB)</th>
					</tr>
				</thead>
				<tbody id="traffic-table-body"></tbody>
			</table>
		</div>
	</div>
	<script>
		const weekLabels = [
			'週一', '週二', '週三', '週四', '週五', '週六', '週日'
		];

		function randomMB(min, max) {
			return Math.floor(Math.random() * (max - min + 1)) + min;
		}

		const trafficData = weekLabels.map((label) => ({
			day: label,
			inboundMB: randomMB(220, 980),
			outboundMB: randomMB(130, 760)
		}));

		const tableBody = document.getElementById('traffic-table-body');
		const totalInboundEl = document.getElementById('total-inbound');
		const totalOutboundEl = document.getElementById('total-outbound');

		let totalInbound = 0;
		let totalOutbound = 0;

		trafficData.forEach((item) => {
			totalInbound += item.inboundMB;
			totalOutbound += item.outboundMB;

			const row = document.createElement('tr');
			row.innerHTML = `
				<td>${item.day}</td>
				<td>${item.inboundMB} MB</td>
				<td>${item.outboundMB} MB</td>
			`;
			tableBody.appendChild(row);
		});

		totalInboundEl.textContent = `${totalInbound.toLocaleString()} MB`;
		totalOutboundEl.textContent = `${totalOutbound.toLocaleString()} MB`;

		// Draw line chart
		const canvas = document.getElementById('traffic-chart');
		const ctx = canvas.getContext('2d');

		const padding = 50;
		const chartWidth = canvas.clientWidth - 2 * padding;
		const chartHeight = 300;

		canvas.width = canvas.clientWidth * window.devicePixelRatio;
		canvas.height = (chartHeight + 2 * padding) * window.devicePixelRatio;

		const scale = window.devicePixelRatio;
		ctx.scale(scale, scale);

		// Get max value for Y axis
		const maxY = Math.max(
			...trafficData.map(item => Math.max(item.inboundMB, item.outboundMB))
		);
		const yStep = Math.ceil(maxY / 5 / 100) * 100;

		// Draw background grid
		ctx.strokeStyle = '#e2e8f0';
		ctx.lineWidth = 1;
		for (let i = 0; i <= 5; i++) {
			const y = padding + (chartHeight / 5) * i;
			ctx.beginPath();
			ctx.moveTo(padding, y);
			ctx.lineTo(padding + chartWidth, y);
			ctx.stroke();

			// Y axis labels
			const value = maxY - (i * yStep);
			ctx.fillStyle = '#64748b';
			ctx.font = '12px system-ui';
			ctx.textAlign = 'right';
			ctx.fillText(value, padding - 10, y + 4);
		}

		// Draw X axis
		ctx.strokeStyle = '#cbd5e1';
		ctx.lineWidth = 2;
		ctx.beginPath();
		ctx.moveTo(padding, padding + chartHeight);
		ctx.lineTo(padding + chartWidth, padding + chartHeight);
		ctx.stroke();

		// Draw Y axis
		ctx.beginPath();
		ctx.moveTo(padding, padding);
		ctx.lineTo(padding, padding + chartHeight);
		ctx.stroke();

		const pointSpacing = chartWidth / (trafficData.length - 1);

		// Helper function to draw line
		function drawLine(data, color) {
			ctx.strokeStyle = color;
			ctx.lineWidth = 3;
			ctx.lineJoin = 'round';
			ctx.lineCap = 'round';

			ctx.beginPath();
			data.forEach((value, index) => {
				const x = padding + index * pointSpacing;
				const y = padding + chartHeight - (value / maxY) * chartHeight;
				if (index === 0) {
					ctx.moveTo(x, y);
				} else {
					ctx.lineTo(x, y);
				}
			});
			ctx.stroke();

			// Draw points
			ctx.fillStyle = color;
			data.forEach((value, index) => {
				const x = padding + index * pointSpacing;
				const y = padding + chartHeight - (value / maxY) * chartHeight;
				ctx.beginPath();
				ctx.arc(x, y, 5, 0, Math.PI * 2);
				ctx.fill();
			});
		}

		// Draw lines for inbound and outbound
		drawLine(trafficData.map(item => item.inboundMB), '#38bdf8');
		drawLine(trafficData.map(item => item.outboundMB), '#818cf8');

		// Draw X axis labels
		ctx.fillStyle = '#64748b';
		ctx.font = '12px system-ui';
		ctx.textAlign = 'center';
		trafficData.forEach((item, index) => {
			const x = padding + index * pointSpacing;
			ctx.fillText(item.day, x, padding + chartHeight + 20);
		});

		// Draw Y axis label
		ctx.save();
		ctx.translate(15, padding + chartHeight / 2);
		ctx.rotate(-Math.PI / 2);
		ctx.fillStyle = '#64748b';
		ctx.font = '12px system-ui';
		ctx.textAlign = 'center';
		ctx.fillText('流量 (MB)', 0, 0);
		ctx.restore();
	</script>
</body>
</html>
